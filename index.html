<!DOCTYPE html>

    <link rel="stylesheet" href="./css/홈.css">

</head>

<body>
<header class="steam-header">
    <div class="logo-area">
        <div class="container">
            <a href="/" class="main-logo"><span class="logo-text">Web For Indie Game</span></a>
        </div>
    </div>
    <nav class="nav-bar">
        <div class="container">
            <ul class="menu-list">
                <li><a href="index.html">홈</a></li>
                <li><a href="./site/2.카테고리.html">카테고리</a></li>
                <li><a href="./site/3.즐겨찾기.html">즐겨찾기</a></li>

            </ul>
        </div>
    </nav>

<section class="game-section">
    <h2 class="section-title">추천 게임</h2>
    <a href="./site/게임상세.html?id=game1" class="featured-banner-link" style="text-decoration: none; color: inherit;">
        <div class="featured-banner">
            <div class="featured-main-img">
                <img id="main-img" src="/img/로그라이크,액션.png" alt="메인 게임 이미지">            
            </div>
            <div class="featured-side-info">
                <h3 class="main-game" id="main-title">로딩 중...</h3>
                <p class="main-intro" id="main-tags"></p>
                <div class="price-tag" id="main-price"></div>
            </div>
        </div>
    </a>
</section>

<div class="game-stack-view">
    
    <section class="stack-section">
        <h2 class="section-title">최신 게임</h2>
        <div class="game-list-vertical">
            
            <a href="./site/게임상세.html?id=game2" style="text-decoration: none; color: inherit;">
                <div class="mini-card">
                    <div class="card-img"><img id="g2-img" src="/img/로그라이크,액션.png"></div>
                    <div class="card-info">
                        <div class="game-title" id="g2-title">로딩 중...</div>
                        <div class="game-genre" id="g2-tags"></div>
                    </div>
                    <div class="card-price-area"><div class="price-box no-discount"><span class="final-price" id="g2-price"></span></div></div>
                </div>
            </a>

            <a href="./site/게임상세.html?id=game3" style="text-decoration: none; color: inherit;">

                </div>
            </a>

        </div>
    </section>

    <section class="stack-section">
        <h2 class="section-title">인기 게임</h2>
        <div class="game-list-vertical">
            
            <a href="./site/게임상세.html?id=game5" style="text-decoration: none; color: inherit;">
