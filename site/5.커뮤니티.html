커뮤니티
    <header class="steam-header">
        </header>

    <main class="content-area">
        <div class="container">
            <div class="community-header">
                <h2 class="section-title">인디 게임 커뮤니티</h2>
                <button class="write-trigger-btn" onclick="openModal()">글쓰기</button>
            </div>
            
            <div class="board-wrapper">
                <table class="board-table">
                    <thead>
                        <tr>
                            <th class="th-num">번호</th>
                            <th class="th-title">제목</th>
                            <th class="th-author">작성자</th>
                            <th class="th-date">날짜</th>
                        </tr>
                    </thead>
                    <tbody id="board-content">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="write-modal" class="modal-overlay hidden">
        <div class="modal-window">
            <div class="modal-header">
                <h3>새 글 작성하기</h3>
                <button class="close-btn" onclick="closeModal()">X</button>
            </div>
            <div class="modal-body">
                <input type="text" id="post-title" placeholder="제목을 입력하세요">
                <input type="text" id="post-author" placeholder="작성자 닉네임">
                <textarea id="post-content" rows="8" placeholder="내용을 작성해 주세요..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="submit-btn" onclick="submitPost()">등록하기</button>
            </div>
        </div>

    </div>

    <script src="../JS/5.커뮤니티.js"></script>

</body>
</html>
